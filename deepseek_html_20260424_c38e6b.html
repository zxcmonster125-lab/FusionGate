<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FusionGate — Форум</title>
    <!-- Google Fonts: Rajdhani для заголовков, JetBrains Mono для кода, Inter для тела -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #0f0f0f;
            --bg-card: #141414;
            --bg-card-hover: #1a1a1a;
            --bg-input: #111;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --text-muted: #666;
            --neon-cyan: #00ffcc;
            --neon-magenta: #ff00ff;
            --neon-cyan-dim: rgba(0, 255, 204, 0.15);
            --neon-magenta-dim: rgba(255, 0, 255, 0.15);
            --neon-cyan-glow: rgba(0, 255, 204, 0.4);
            --neon-magenta-glow: rgba(255, 0, 255, 0.4);
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-neon: rgba(0, 255, 204, 0.25);
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --font-heading: 'Rajdhani', 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', 'Consolas', monospace;
            --font-body: 'Inter', 'Segoe UI', sans-serif;
            --header-height: 56px;
            --transition-fast: 0.15s ease;
            --transition-smooth: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            /* Сетка на фоне в стиле киберпанк */
            background-image:
                linear-gradient(rgba(0, 255, 204, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 204, 0.025) 1px, transparent 1px);
            background-size: 32px 32px;
            background-position: center center;
            background-attachment: fixed;
        }

        /* Скроллбар в стиле киберпанк */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 204, 0.3);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 255, 204, 0.55);
        }

        /* ========== HEADER ========== */
        #header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(10, 10, 10, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border-neon);
            box-shadow: 0 2px 20px rgba(0, 255, 204, 0.08);
            height: var(--header-height);
        }
        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 16px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
            cursor: pointer;
            user-select: none;
            transition: var(--transition-fast);
        }
        .logo-area:hover {
            filter: brightness(1.2);
        }
        .logo-img {
            height: 36px;
            width: auto;
            max-width: 140px;
            object-fit: contain;
            border-radius: var(--radius-sm);
        }
        .logo-text {
            font-family: var(--font-heading);
            font-size: 1.55rem;
            font-weight: 700;
            letter-spacing: 0.06em;
            background: linear-gradient(135deg, var(--neon-cyan), #00ddaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 255, 204, 0.5);
            white-space: nowrap;
        }
        .logo-upload-btn {
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-neon);
            background: transparent;
            color: var(--neon-cyan);
            cursor: pointer;
            font-family: var(--font-body);
            transition: var(--transition-fast);
            white-space: nowrap;
            flex-shrink: 0;
        }
        .logo-upload-btn:hover {
            background: var(--neon-cyan-dim);
            box-shadow: 0 0 12px var(--neon-cyan-glow);
        }
        .logo-upload-btn.delete-logo {
            border-color: rgba(255, 80, 80, 0.4);
            color: #ff5555;
            font-size: 0.65rem;
            padding: 3px 8px;
        }
        .logo-upload-btn.delete-logo:hover {
            background: rgba(255, 80, 80, 0.15);
            box-shadow: 0 0 10px rgba(255, 80, 80, 0.35);
        }

        /* Навигация */
        #nav-links {
            display: flex;
            align-items: center;
            gap: 6px;
            list-style: none;
            flex-wrap: wrap;
        }
        #nav-links li a,
        #nav-links li button {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 8px 14px;
            border-radius: var(--radius-md);
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.88rem;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
            background: transparent;
            font-family: var(--font-body);
            transition: var(--transition-smooth);
            white-space: nowrap;
        }
        #nav-links li a:hover,
        #nav-links li button:hover {
            color: var(--neon-cyan);
            border-color: var(--border-neon);
            background: var(--neon-cyan-dim);
            box-shadow: 0 0 14px rgba(0, 255, 204, 0.2);
        }
        #nav-links li a.active,
        #nav-links li button.active {
            color: var(--neon-cyan);
            border-color: var(--neon-cyan-glow);
            background: rgba(0, 255, 204, 0.1);
            box-shadow: 0 0 18px rgba(0, 255, 204, 0.3);
        }

        /* Блок пользователя */
        .user-area {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .user-area .btn {
            font-size: 0.82rem;
            padding: 7px 16px;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-family: var(--font-body);
            font-weight: 500;
            transition: var(--transition-smooth);
            border: 1px solid transparent;
            white-space: nowrap;
        }
        .btn-login {
            background: transparent;
            color: var(--neon-cyan);
            border-color: var(--border-neon);
        }
        .btn-login:hover {
            background: var(--neon-cyan-dim);
            box-shadow: 0 0 16px var(--neon-cyan-glow);
        }
        .btn-register {
            background: var(--neon-cyan);
            color: #000;
            border-color: var(--neon-cyan);
            font-weight: 600;
        }
        .btn-register:hover {
            box-shadow: 0 0 22px var(--neon-cyan-glow);
            transform: translateY(-1px);
        }
        .btn-logout {
            background: transparent;
            color: #ff6666;
            border-color: rgba(255, 100, 100, 0.4);
            font-size: 0.78rem;
            padding: 6px 12px;
        }
        .btn-logout:hover {
            background: rgba(255, 100, 100, 0.12);
            box-shadow: 0 0 14px rgba(255, 100, 100, 0.3);
        }
        .user-greeting {
            font-size: 0.85rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition-fast);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .user-greeting:hover {
            color: var(--neon-cyan);
        }
        .user-avatar-mini {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--border-neon);
            flex-shrink: 0;
        }
        .user-avatar-placeholder {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--neon-cyan-dim);
            border: 1px solid var(--border-neon);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: var(--neon-cyan);
            flex-shrink: 0;
        }

        /* ========== MAIN CONTENT ========== */
        #main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 16px 60px;
            min-height: calc(100vh - var(--header-height) - 60px);
            animation: fadeInUp 0.35s ease;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes pulseGlow {
            0%,
            100% {
                box-shadow: 0 0 8px rgba(0, 255, 204, 0.2);
            }
            50% {
                box-shadow: 0 0 22px rgba(0, 255, 204, 0.5);
            }
        }
        @keyframes neonFlicker {
            0%,
            100% {
                opacity: 1;
            }
            92% {
                opacity: 1;
            }
            93% {
                opacity: 0.6;
            }
            94% {
                opacity: 1;
            }
            96% {
                opacity: 0.75;
            }
            97% {
                opacity: 1;
            }
        }

        /* Карточки */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: 20px 24px;
            margin-bottom: 12px;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan-glow), transparent);
            opacity: 0;
            transition: var(--transition-smooth);
        }
        .card:hover {
            border-color: var(--border-neon);
            box-shadow: 0 4px 24px rgba(0, 255, 204, 0.1);
            background: var(--bg-card-hover);
        }
        .card:hover::before {
            opacity: 1;
        }
        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 10px;
        }
        .card-title {
            font-family: var(--font-heading);
            font-size: 1.25rem;
            font-weight: 600;
            color: #fff;
            letter-spacing: 0.03em;
            cursor: pointer;
            transition: var(--transition-fast);
        }
        .card-title:hover {
            color: var(--neon-cyan);
            text-shadow: 0 0 18px rgba(0, 255, 204, 0.4);
        }
        .card-meta {
            font-size: 0.78rem;
            color: var(--text-muted);
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }
        .card-meta span {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        .badge-cyan {
            background: var(--neon-cyan-dim);
            color: var(--neon-cyan);
            border: 1px solid rgba(0, 255, 204, 0.3);
        }
        .badge-magenta {
            background: var(--neon-magenta-dim);
            color: var(--neon-magenta);
            border: 1px solid rgba(255, 0, 255, 0.3);
        }

        /* Кнопки */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 9px 18px;
            border-radius: var(--radius-md);
            font-family: var(--font-body);
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid transparent;
            transition: var(--transition-smooth);
            text-decoration: none;
            white-space: nowrap;
        }
        .btn-primary {
            background: var(--neon-cyan);
            color: #000;
            font-weight: 600;
            border-color: var(--neon-cyan);
        }
        .btn-primary:hover {
            box-shadow: 0 0 24px var(--neon-cyan-glow);
            transform: translateY(-1px);
        }
        .btn-outline {
            background: transparent;
            color: var(--neon-cyan);
            border-color: var(--border-neon);
        }
        .btn-outline:hover {
            background: var(--neon-cyan-dim);
            box-shadow: 0 0 16px var(--neon-cyan-glow);
        }
        .btn-sm {
            padding: 5px 12px;
            font-size: 0.75rem;
            border-radius: var(--radius-sm);
        }
        .btn-danger {
            background: transparent;
            color: #ff5555;
            border-color: rgba(255, 85, 85, 0.4);
        }
        .btn-danger:hover {
            background: rgba(255, 85, 85, 0.12);
            box-shadow: 0 0 14px rgba(255, 85, 85, 0.3);
        }

        /* Формы */
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-secondary);
            letter-spacing: 0.02em;
        }
        .form-input,
        .form-textarea {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 0.9rem;
            transition: var(--transition-smooth);
            resize: vertical;
        }
        .form-input:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--neon-cyan-glow);
            box-shadow: 0 0 14px rgba(0, 255, 204, 0.2);
            background: #161616;
        }
        .form-textarea {
            min-height: 100px;
            font-family: var(--font-body);
        }
        .form-hint {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Модальные окна */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(4px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .modal-dialog {
            background: var(--bg-card);
            border: 1px solid var(--border-neon);
            border-radius: var(--radius-lg);
            padding: 28px 24px;
            width: 92%;
            max-width: 520px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 0 50px rgba(0, 255, 204, 0.2);
            animation: fadeInUp 0.3s ease;
            position: relative;
        }
        .modal-dialog h2 {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 18px;
            color: #fff;
            letter-spacing: 0.04em;
        }
        .modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.4rem;
            cursor: pointer;
            transition: var(--transition-fast);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-close:hover {
            color: #ff5555;
            background: rgba(255, 85, 85, 0.1);
        }
        .modal-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 18px;
            border-bottom: 1px solid var(--border-subtle);
        }
        .modal-tab {
            padding: 10px 20px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.88rem;
            color: var(--text-muted);
            border-bottom: 2px solid transparent;
            transition: var(--transition-fast);
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
            font-family: var(--font-body);
        }
        .modal-tab.active {
            color: var(--neon-cyan);
            border-bottom-color: var(--neon-cyan);
        }
        .modal-tab:hover {
            color: #fff;
        }

        /* Сообщения */
        .message-thread {
            margin-left: 0;
            border-left: 2px solid var(--border-subtle);
            padding-left: 16px;
            margin-top: 8px;
        }
        .message-thread .message-thread {
            margin-left: 20px;
            border-left-color: rgba(255, 0, 255, 0.2);
        }
        .message-item {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 14px 16px;
            margin-bottom: 8px;
            transition: var(--transition-smooth);
        }
        .message-item:hover {
            border-color: var(--border-neon);
            box-shadow: 0 2px 12px rgba(0, 255, 204, 0.06);
        }
        .message-author {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--neon-cyan);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .message-time {
            font-size: 0.7rem;
            color: var(--text-muted);
        }
        .message-body {
            margin-top: 8px;
            font-size: 0.9rem;
            line-height: 1.55;
            word-break: break-word;
        }
        .message-body img,
        .message-body video {
            max-width: 100%;
            max-height: 300px;
            border-radius: var(--radius-md);
            margin: 8px 0;
            cursor: pointer;
            border: 1px solid var(--border-subtle);
            transition: var(--transition-smooth);
        }
        .message-body img:hover,
        .message-body video:hover {
            border-color: var(--neon-cyan-glow);
            box-shadow: 0 0 16px rgba(0, 255, 204, 0.25);
        }
        .attachment-preview {
            display: inline-block;
            max-width: 200px;
            max-height: 150px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            border: 1px solid var(--border-subtle);
            margin: 4px;
            transition: var(--transition-smooth);
            object-fit: cover;
        }
        .attachment-preview:hover {
            border-color: var(--neon-cyan-glow);
            box-shadow: 0 0 12px rgba(0, 255, 204, 0.3);
        }
        .reply-btn {
            font-size: 0.72rem;
            padding: 4px 10px;
            margin-top: 6px;
            cursor: pointer;
            background: transparent;
            border: 1px solid var(--border-subtle);
            color: var(--text-muted);
            border-radius: var(--radius-sm);
            transition: var(--transition-fast);
            font-family: var(--font-body);
        }
        .reply-btn:hover {
            border-color: var(--neon-cyan-glow);
            color: var(--neon-cyan);
        }
        .quote-block {
            background: rgba(0, 255, 204, 0.04);
            border-left: 3px solid var(--neon-cyan-glow);
            padding: 8px 12px;
            margin: 8px 0;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            font-size: 0.82rem;
            color: var(--text-secondary);
        }

        /* Пагинация */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .pagination button {
            padding: 7px 14px;
            border-radius: var(--radius-md);
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 0.82rem;
            transition: var(--transition-fast);
        }
        .pagination button:hover {
            border-color: var(--neon-cyan-glow);
            color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2);
        }
        .pagination button.active-page {
            background: var(--neon-cyan);
            color: #000;
            border-color: var(--neon-cyan);
            font-weight: 600;
        }
        .pagination button:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* Поиск */
        .search-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .search-bar .form-input {
            flex: 1;
            min-width: 200px;
        }

        /* Профиль */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        .profile-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--neon-cyan-glow);
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.25);
            flex-shrink: 0;
        }
        .profile-avatar-placeholder {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: var(--neon-cyan-dim);
            border: 2px solid var(--neon-cyan-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--neon-cyan);
            flex-shrink: 0;
        }
        .profile-info h2 {
            font-family: var(--font-heading);
            font-size: 1.6rem;
            color: #fff;
            letter-spacing: 0.04em;
        }
        .profile-stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 6px;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* Пустое состояние */
        .empty-state {
            text-align: center;
            padding: 50px 20px;

        .empty-state h3 {

            font-size: 1.3rem;
            color: var(--text-secondary);

        /* ========== АДАПТИВ ========== */
        @media (max-width: 768px) {
            .header-inner {
                flex-wrap: wrap;

        /* Утилиты */

            display: none !important;

        .text-cyan {
            color: var(--neon-cyan);

        }
        .flex-row {

            align-items: center;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>

    <!-- ==================== HEADER ==================== -->
    <header id="header">
        <div class="header-inner">
            <div class="logo-area" id="logoArea" title="FusionGate — на главную">
                <!-- Логотип (изображение или текст) рендерится через JS -->
                <span class="logo-text" id="logoText">FusionGate</span>
                <img class="logo-img hidden" id="logoImg" src="" alt="FusionGate Logo">
            </div>
            <button class="logo-upload-btn" id="btnUploadLogo" title="Загрузить логотип форума">🖼 Лого</button>
            <button class="logo-upload-btn delete-logo hidden" id="btnDeleteLogo" title="Удалить логотип">✕</button>

            <ul id="nav-links">
                <li><a href="#" data-view="topics" class="active">📋 Темы</a></li>
                <li><a href="#" data-view="search">🔍 Поиск</a></li>
                <li><button id="btnNewTopic" class="btn-outline btn-sm">＋ Новая тема</button></li>
            </ul>

            <div class="user-area" id="userArea">
                <!-- Гостевой режим -->
                <span id="guestButtons">
                    <button class="btn btn-login" id="btnShowAuth">🔐 Войти</button>
                </span>
                <!-- Режим пользователя -->
                <span id="userInfo" class="hidden">
                    <span class="user-greeting" id="userGreeting" title="Профиль">
                        <span id="userAvatarMini"></span>
                        <span id="userNameDisplay"></span>
                    </span>
                    <button class="btn btn-logout btn-sm" id="btnLogout">Выйти</button>
                </span>
            </div>
        </div>
    </header>

    <!-- ==================== MAIN CONTENT ==================== -->
    <main id="main-content">
        <!-- Динамический контент рендерится через JS -->
        <div id="viewContainer"></div>
    </main>

    <!-- ==================== МОДАЛЬНЫЕ ОКНА ==================== -->
    <div id="modalsContainer"></div>

    <!-- Скрытый инпут для загрузки логотипа -->
    <input type="file" id="hiddenLogoInput" accept="image/*" class="hidden">

    <!-- Скрытый инпут для загрузки аватара -->
    <input type="file" id="hiddenAvatarInput" accept="image/*" class="hidden">

    <!-- Скрытый инпут для загрузки вложений в сообщения -->
    <input type="file" id="hiddenAttachmentInput" accept="image/*,video/mp4,video/webm" class="hidden" multiple>

    <!-- ==================== ФУТЕР ==================== -->
    <footer style="text-align:center;padding:16px;font-size:0.7rem;color:var(--text-muted);border-top:1px solid var(--border-subtle);">
        <span>FusionGate © 2026</span>
        <span style="margin:0 8px;">|</span>
        <span>⚡ Powered by localStorage</span>
    </footer>

    <script>
        (function() {
            // ============================================================
            //  КОНСТАНТЫ И КЛЮЧИ localStorage
            // ============================================================
            const PREFIX = 'fg_';
            const KEYS = {
                USERS: PREFIX + 'users',
                TOPICS: PREFIX + 'topics',
                MESSAGES: PREFIX + 'messages',
                SESSION: PREFIX + 'session',
                LOGO: PREFIX + 'logo',
                NEXT_IDS: PREFIX + 'nextIds'
            };
            const TOPICS_PER_PAGE = 15;

            // ============================================================
            //  РАБОТА С ДАННЫМИ В localStorage
            // ============================================================
            function getData(key) {
                try {
                    const raw = localStorage.getItem(key);
                    return raw ? JSON.parse(raw) : null;
                } catch (e) {
                    console.error('Ошибка чтения из localStorage:', key, e);
                    return null;
                }
            }

            function setData(key, value) {
                try {
                    localStorage.setItem(key, JSON.stringify(value));
                } catch (e) {
                    console.error('Ошибка записи в localStorage:', key, e);
                    alert('Ошибка сохранения данных. Возможно, переполнено хранилище браузера.');
                }
            }

            function getNextId(entityType) {
                const ids = getData(KEYS.NEXT_IDS) || { users: 1, topics: 1, messages: 1 };
                const id = ids[entityType] || 1;
                ids[entityType] = id + 1;
                setData(KEYS.NEXT_IDS, ids);
                return id;
            }

            // Инициализация хранилища, если пусто
            function initStorage() {
                if (!getData(KEYS.USERS)) setData(KEYS.USERS, []);
                if (!getData(KEYS.TOPICS)) setData(KEYS.TOPICS, []);
                if (!getData(KEYS.MESSAGES)) setData(KEYS.MESSAGES, []);
                if (!getData(KEYS.NEXT_IDS)) setData(KEYS.NEXT_IDS, { users: 1, topics: 1, messages: 1 });
                if (getData(KEYS.SESSION) === undefined || getData(KEYS.SESSION) === null) {
                    setData(KEYS.SESSION, null);
                }
            }

            // ============================================================
            //  ХЕШИРОВАНИЕ ПАРОЛЕЙ (SHA-256 через SubtleCrypto)
            // ============================================================
            async function hashPassword(password) {
                const encoder = new TextEncoder();
                const data = encoder.encode(password);
                const hashBuffer = await crypto.subtle.digest('SHA-256', data);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            }

            // ============================================================
            //  СЕССИЯ ПОЛЬЗОВАТЕЛЯ
            // ============================================================
            function getSession() {
                return getData(KEYS.SESSION);
            }

            function setSession(session) {
                setData(KEYS.SESSION, session);
            }

            function clearSession() {
                setData(KEYS.SESSION, null);
            }

            function isLoggedIn() {
                const session = getSession();
                return session && session.userId;
            }

            function getCurrentUserId() {
                const session = getSession();
                return session ? session.userId : null;
            }

            function getCurrentUser() {
                const session = getSession();
                if (!session || !session.userId) return null;
                const users = getData(KEYS.USERS) || [];
                return users.find(u => u.id === session.userId) || null;
            }

            // ============================================================
            //  АВТОРИЗАЦИЯ И РЕГИСТРАЦИЯ
            // ============================================================
            async function registerUser(username, password) {
                const users = getData(KEYS.USERS) || [];
                // Проверка уникальности ника
                if (users.some(u => u.username.toLowerCase() === username.toLowerCase())) {
                    return { success: false, error: 'Пользователь с таким ником уже существует.' };
                }
                if (username.trim().length < 2) {
                    return { success: false, error: 'Ник должен содержать минимум 2 символа.' };
                }
                if (password.length < 3) {
                    return { success: false, error: 'Пароль должен содержать минимум 3 символа.' };
                }
                const passwordHash = await hashPassword(password);
                const newUser = {
                    id: getNextId('users'),
                    username: username.trim(),
                    passwordHash: passwordHash,
                    avatar: null, // base64 строка или null
                    bio: '',
                    createdAt: new Date().toISOString(),
                    topicCount: 0,
                    messageCount: 0
                };
                users.push(newUser);
                setData(KEYS.USERS, users);
                // Автоматический вход после регистрации
                setSession({ userId: newUser.id, username: newUser.username });
                return { success: true, user: newUser };
            }

            async function loginUser(username, password) {
                const users = getData(KEYS.USERS) || [];
                const user = users.find(u => u.username.toLowerCase() === username.toLowerCase());
                if (!user) {
                    return { success: false, error: 'Пользователь с таким ником не найден.' };
                }
                const passwordHash = await hashPassword(password);
                if (user.passwordHash !== passwordHash) {
                    return { success: false, error: 'Неверный пароль.' };
                }
                setSession({ userId: user.id, username: user.username });
                return { success: true, user: user };
            }

            function logoutUser() {
                clearSession();
            }

            // ============================================================
            //  ПРОФИЛЬ ПОЛЬЗОВАТЕЛЯ
            // ============================================================
            function updateUserProfile(userId, updates) {
                const users = getData(KEYS.USERS) || [];
                const index = users.findIndex(u => u.id === userId);
                if (index === -1) return false;
                // Нельзя менять id, passwordHash, createdAt, topicCount, messageCount через профиль
                const allowedKeys = ['avatar', 'bio'];
                for (const key of allowedKeys) {
                    if (updates[key] !== undefined) {
                        users[index][key] = updates[key];
                    }
                }
                // Если меняется username — нужна доп. проверка
                if (updates.username && updates.username.trim().length >= 2) {
                    const trimmed = updates.username.trim();
                    if (!users.some(u => u.username.toLowerCase() === trimmed.toLowerCase() && u.id !== userId)) {
                        users[index].username = trimmed;
                        // Обновить сессию
                        const session = getSession();
                        if (session && session.userId === userId) {
                            session.username = trimmed;
                            setSession(session);
                        }
                    }
                }
                setData(KEYS.USERS, users);
                return true;
            }

            function incrementUserTopicCount(userId) {
                const users = getData(KEYS.USERS) || [];
                const user = users.find(u => u.id === userId);
                if (user) {
                    user.topicCount = (user.topicCount || 0) + 1;
                    setData(KEYS.USERS, users);
                }
            }

            function incrementUserMessageCount(userId) {
                const users = getData(KEYS.USERS) || [];
                const user = users.find(u => u.id === userId);
                if (user) {
                    user.messageCount = (user.messageCount || 0) + 1;
                    setData(KEYS.USERS, users);
                }
            }

            function getUserById(userId) {
                const users = getData(KEYS.USERS) || [];
                return users.find(u => u.id === userId) || null;
            }

            // ============================================================
            //  ЛОГОТИП ФОРУМА
            // ============================================================
            function getLogo() {
                return localStorage.getItem(KEYS.LOGO) || null;
            }

            function setLogo(base64) {
                localStorage.setItem(KEYS.LOGO, base64);
            }

            function removeLogo() {
                localStorage.removeItem(KEYS.LOGO);
            }

            // ============================================================
            //  КОНВЕРТАЦИЯ ФАЙЛА В BASE64
            // ============================================================
            function fileToBase64(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = () => reject(new Error('Ошибка чтения файла'));
                    reader.readAsDataURL(file);
                });
            }

            function validateFileSize(file, maxMB = 2) {
                const maxBytes = maxMB * 1024 * 1024;
                if (file.size > maxBytes) {
                    return { valid: false, error: `Файл «${file.name}» превышает лимит ${maxMB} МБ (размер: ${(file.size / 1024 / 1024).toFixed(2)} МБ).` };
                }
                return { valid: true };
            }

            function isImageFile(file) {
                return file.type.startsWith('image/');
            }

            function isVideoFile(file) {
                return file.type.startsWith('video/');
            }

            function isImageURL(url) {
                return /\.(jpg|jpeg|png|gif|webp|svg)(\?.*)?$/i.test(url) || url.startsWith('data:image/');
            }

            function isVideoURL(url) {
                return /\.(mp4|webm)(\?.*)?$/i.test(url) || url.startsWith('data:video/');
            }

            // ============================================================
            //  ЭКРАНИРОВАНИЕ HTML (защита от XSS)
            // ============================================================
            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function sanitizeText(str) {
                // Экранируем HTML, но разрешаем переносы строк
                return escapeHTML(str).replace(/\n/g, '<br>');
            }

            // ============================================================
            //  ФОРМАТИРОВАНИЕ ДАТЫ
            // ============================================================
            function formatDate(isoString) {
                const d = new Date(isoString);
                const now = new Date();
                const diff = now - d;
                if (diff < 60000) return 'только что';
                if (diff < 3600000) return `${Math.floor(diff / 60000)} мин. назад`;
                if (diff < 86400000) return `${Math.floor(diff / 3600000)} ч. назад`;
                if (diff < 604800000) return `${Math.floor(diff / 86400000)} дн. назад`;
                return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', year: 'numeric' }) +
                    ' ' + d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            }
            // ============================================================
            //  HTML-КОМПОНЕНТЫ (генерация DOM-элементов)
            // ============================================================
            function createModal(modalId, contentHTML) {
                const overlay = document.createElement('div');
                overlay.className = 'modal-overlay';
                overlay.id = modalId;
                overlay.innerHTML = `
                    <div class="modal-dialog">
                        <button class="modal-close" data-close="${modalId}">✕</button>
                        ${contentHTML}
                    </div>
                `;
                overlay.addEventListener('click', function(e) {
                    if (e.target === overlay) closeModal(modalId);
                });
                overlay.querySelector('.modal-close').addEventListener('click', () => closeModal(modalId));
                return overlay;
            }

            function openModal(modalId, contentHTML) {
                const existing = document.getElementById(modalId);
                if (existing) existing.remove();
                const modal = createModal(modalId, contentHTML);
                document.getElementById('modalsContainer').appendChild(modal);
                document.body.style.overflow = 'hidden';
            }

            function closeModal(modalId) {
                const modal = document.getElementById(modalId);
                if (modal) {
                    modal.remove();
                }
                if (document.getElementById('modalsContainer').children.length === 0) {
                    document.body.style.overflow = '';
                }
            }

            function closeAllModals() {
                document.getElementById('modalsContainer').innerHTML = '';
                document.body.style.overflow = '';
            }

            // ============================================================
            //  ПОЛНОЭКРАННЫЙ ПРОСМОТР ВЛОЖЕНИЯ
            // ============================================================
            function openFullscreenView(src, type) {
                const modalId = 'fullscreenView';
                let mediaHTML;
                if (type === 'video') {
                    mediaHTML =
                        `<video src="${src}" controls autoplay style="max-width:90vw;max-height:85vh;border-radius:8px;"></video>`;
                } else {
                    mediaHTML =
                        `<img src="${src}" style="max-width:90vw;max-height:85vh;border-radius:8px;object-fit:contain;" alt="Полноэкранный просмотр">`;
                }
                openModal(modalId, `
                    <div style="text-align:center;">
                        ${mediaHTML}
                        <div class="mt-8">
                            <a href="${src}" download target="_blank" class="btn btn-outline btn-sm">📥 Скачать</a>
                        </div>
                    </div>
                `);
            }

            // ============================================================
            //  РЕНДЕРИНГ ВЛОЖЕНИЙ В СООБЩЕНИИ
            // ============================================================
            function renderAttachments(attachments) {
                if (!attachments || attachments.length === 0) return '';
                let html = '<div class="flex-row gap-8" style="margin-top:8px;">';
                for (const att of attachments) {
                    const src = escapeHTML(att.url);
                    const name = escapeHTML(att.name || 'вложение');
                    if (att.type === 'image') {
                        html +=
                            `<img src="${src}" alt="${name}" class="attachment-preview" onclick="event.stopPropagation();window._fg_openFullscreen('${src.replace(/'/g, "\\'")}', 'image')" loading="lazy" title="${name}">`;
                    } else if (att.type === 'video') {
                        html +=
                            `<video src="${src}" class="attachment-preview" muted preload="metadata" onclick="event.stopPropagation();window._fg_openFullscreen('${src.replace(/'/g, "\\'")}', 'video')" title="${name}"></video>`;
                    }
                }
                html += '</div>';
                return html;
            }
            // Экспорт глобальной функции для onclick
            window._fg_openFullscreen = openFullscreenView;

            // ============================================================
            //  ИНИЦИАЛИЗАЦИЯ ПРИ ЗАГРУЗКЕ
            // ============================================================
            initStorage();

            // ============================================================
            //  ТЕКУЩЕЕ СОСТОЯНИЕ ПРИЛОЖЕНИЯ
            // ============================================================
            let currentView = 'topics';
            let currentTopicPage = 1;
            let currentSearchQuery = '';
            let currentProfileUserId = null;
            let currentTopicId = null;

            // ============================================================
            //  ОТОБРАЖЕНИЕ ШАПКИ (логотип + пользователь)
            // ============================================================
            function renderHeader() {
                const logo = getLogo();
                const logoImg = document.getElementById('logoImg');
                const logoText = document.getElementById('logoText');
                const btnDeleteLogo = document.getElementById('btnDeleteLogo');
                const btnUploadLogo = document.getElementById('btnUploadLogo');

                if (logo) {
                    logoImg.src = logo;
                    logoImg.classList.remove('hidden');
                    logoText.classList.add('hidden');
                    btnDeleteLogo.classList.remove('hidden');
                    btnUploadLogo.textContent = '🖼 Сменить';
                } else {
                    logoImg.classList.add('hidden');
                    logoText.classList.remove('hidden');
                    btnDeleteLogo.classList.add('hidden');
                    btnUploadLogo.textContent = '🖼 Лого';
                }

                // Пользовательская часть
                const guestButtons = document.getElementById('guestButtons');
                const userInfo = document.getElementById('userInfo');
                const userGreeting = document.getElementById('userGreeting');
                const userNameDisplay = document.getElementById('userNameDisplay');
                const userAvatarMini = document.getElementById('userAvatarMini');
                const btnNewTopic = document.getElementById('btnNewTopic');

                if (isLoggedIn()) {
                    const user = getCurrentUser();
                    guestButtons.classList.add('hidden');
                    userInfo.classList.remove('hidden');
                    userNameDisplay.textContent = user ? user.username : '';
                    if (user && user.avatar) {
                        userAvatarMini.innerHTML =
                            `<img src="${escapeHTML(user.avatar)}" class="user-avatar-mini" alt="Avatar">`;
                    } else {
                        userAvatarMini.innerHTML =
                            '<span class="user-avatar-placeholder">👤</span>';
                    }
                    btnNewTopic.classList.remove('hidden');
                } else {
                    guestButtons.classList.remove('hidden');
                    userInfo.classList.add('hidden');
                    btnNewTopic.classList.add('hidden');
                }
            }
            // ============================================================
            //  НАВИГАЦИЯ ПО ВЬЮХАМ
            // ============================================================
            function navigateTo(view, data = null) {
                currentView = view;
                // Обновляем активный пункт меню
                document.querySelectorAll('#nav-links a').forEach(a => a.classList.remove('active'));
                const activeLink = document.querySelector(`#nav-links a[data-view="${view}"]`);
                if (activeLink) activeLink.classList.add('active');

                const container = document.getElementById('viewContainer');
                switch (view) {
                    case 'topics':
                        currentTopicPage = data && data.page ? data.page : 1;
                        renderTopicsList();
                        break;
                    case 'topic':
                        currentTopicId = data && data.topicId ? data.topicId : null;
                        renderTopicView();
                        break;
                    case 'search':
                        currentSearchQuery = data && data.query ? data.query : '';
                        renderSearchView();
                        break;
                    case 'profile':
                        currentProfileUserId = data && data.userId ? data.userId : getCurrentUserId();
                        renderProfileView();
                        break;
                    default:
                        renderTopicsList();
                }
                // Скролл вверх при смене вьюхи
                window.scrollTo({ top: 0, behavior: 'smooth' });
                // Перерендер шапки (могла измениться сессия)
                renderHeader();
            }

            // ============================================================
            //  РЕНДЕРИНГ СПИСКА ТЕМ
            // ============================================================
            function renderTopicsList() {
                const container = document.getElementById('viewContainer');
                const topics = getData(KEYS.TOPICS) || [];
                // Сортировка: новые сверху
                const sortedTopics = [...topics].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
                const totalPages = Math.max(1, Math.ceil(sortedTopics.length / TOPICS_PER_PAGE));
                if (currentTopicPage > totalPages) currentTopicPage = totalPages;
                const start = (currentTopicPage - 1) * TOPICS_PER_PAGE;
                const pageTopics = sortedTopics.slice(start, start + TOPICS_PER_PAGE);

                let html = '<h1 style="font-family:var(--font-heading);font-size:1.8rem;margin-bottom:16px;letter-spacing:0.04em;">📋 Темы форума</h1>';

                if (isLoggedIn()) {
                    html +=
                        `<button class="btn btn-primary mb-16" id="btnCreateTopicTop" style="margin-bottom:16px;">＋ Создать новую тему</button>`;
                }

                if (pageTopics.length === 0) {
                    html += `
                        <div class="empty-state">
                            <span class="icon">💬</span>
                            <h3>Тем пока нет</h3>
                            <p>Будьте первым, кто создаст тему на форуме!</p>
                        </div>`;
                } else {
                    for (const topic of pageTopics) {
                        const author = getUserById(topic.authorId);
                        const authorName = author ? escapeHTML(author.username) : 'Неизвестный';
                        const msgCount = topic.messageCount || 0;
                        html += `
                            <div class="card topic-card" data-topic-id="${topic.id}" style="cursor:pointer;">
                                <div class="card-header">
                                    <span class="card-title">${escapeHTML(topic.title)}</span>
                                    <span class="badge badge-cyan">${msgCount} ✉</span>
                                </div>
                                <div class="card-meta">
                                    <span>👤 ${authorName}</span>
                                    <span>🕐 ${formatDate(topic.createdAt)}</span>
                                </div>
                            </div>`;
                    }
                }

                // Пагинация
                if (totalPages > 1) {
                    html += '<div class="pagination">';
                    html +=
                        `<button ${currentTopicPage === 1 ? 'disabled' : ''} data-page="${currentTopicPage - 1}">◀ Назад</button>`;
                    for (let p = 1; p <= totalPages; p++) {
                        html +=
                            `<button class="${p === currentTopicPage ? 'active-page' : ''}" data-page="${p}">${p}</button>`;
                    }
                    html +=
                        `<button ${currentTopicPage === totalPages ? 'disabled' : ''} data-page="${currentTopicPage + 1}">Вперёд ▶</button>`;
                    html += '</div>';
                }

                container.innerHTML = html;

                // Обработчики кликов по карточкам тем
                container.querySelectorAll('.topic-card').forEach(card => {
                    card.addEventListener('click', function() {
                        const topicId = parseInt(this.dataset.topicId);
                        navigateTo('topic', { topicId });
                    });
                });
                // Обработчики пагинации
                container.querySelectorAll('.pagination button[data-page]').forEach(btn => {
                    btn.addEventListener('click', function() {
                        currentTopicPage = parseInt(this.dataset.page);
                        renderTopicsList();
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    });
                });
                // Кнопка создания темы
                const btnCreate = container.querySelector('#btnCreateTopicTop');
                if (btnCreate) {
                    btnCreate.addEventListener('click', openCreateTopicModal);
                }
            }
            // ============================================================
            //  МОДАЛЬНОЕ ОКНО: АВТОРИЗАЦИЯ / РЕГИСТРАЦИЯ
            // ============================================================
            function openAuthModal(tab = 'login') {
                const modalId = 'authModal';
                const contentHTML = `
                    <h2>🔐 Доступ к FusionGate</h2>
                    <div class="modal-tabs">
                        <button class="modal-tab ${tab === 'login' ? 'active' : ''}" data-tab="login">Вход</button>
                        <button class="modal-tab ${tab === 'register' ? 'active' : ''}" data-tab="register">Регистрация</button>
                    </div>
                    <div id="authFormContainer"></div>
                    <div id="authError" class="text-muted mt-8" style="color:#ff6666!important;min-height:20px;"></div>
                `;
                openModal(modalId, contentHTML);
                renderAuthForm(tab);

                // Обработчики табов
                const modalEl = document.getElementById(modalId);
                modalEl.querySelectorAll('.modal-tab').forEach(tabBtn => {
                    tabBtn.addEventListener('click', function() {
                        const newTab = this.dataset.tab;
                        modalEl.querySelectorAll('.modal-tab').forEach(t => t.classList.remove(
                            'active'));
                        this.classList.add('active');
                        renderAuthForm(newTab);
                        document.getElementById('authError').textContent = '';
                    });
                });
            }

            function renderAuthForm(tab) {
                const container = document.getElementById('authFormContainer');
                if (!container) return;
                if (tab === 'login') {
                    container.innerHTML = `
                        <div class="form-group">
                            <label>Никнейм</label>
                            <input type="text" class="form-input" id="loginUsername" placeholder="Введите ник" autocomplete="username">
                        </div>
                        <div class="form-group">
                            <label>Пароль</label>
                            <input type="password" class="form-input" id="loginPassword" placeholder="Введите пароль" autocomplete="current-password">
                        </div>
                        <button class="btn btn-primary" id="btnLogin" style="width:100%;">Войти</button>
                    `;
                    document.getElementById('btnLogin').addEventListener('click', handleLogin);
                    document.getElementById('loginPassword').addEventListener('keydown', function(e) {
                        if (e.key === 'Enter') handleLogin();
                    });
                } else {
                    container.innerHTML = `
                        <div class="form-group">
                            <label>Никнейм</label>
                            <input type="text" class="form-input" id="regUsername" placeholder="Придумайте ник" autocomplete="off">
                        </div>
                        <div class="form-group">
                            <label>Пароль</label>
                            <input type="password" class="form-input" id="regPassword" placeholder="Придумайте пароль (мин. 3 символа)" autocomplete="new-password">
                        </div>
                        <div class="form-group">
                            <label>Подтверждение пароля</label>
                            <input type="password" class="form-input" id="regPasswordConfirm" placeholder="Повторите пароль" autocomplete="new-password">
                        </div>
                        <button class="btn btn-primary" id="btnRegister" style="width:100%;">Зарегистрироваться</button>
                    `;
                    document.getElementById('btnRegister').addEventListener('click', handleRegister);
                    document.getElementById('regPasswordConfirm').addEventListener('keydown', function(e) {
                        if (e.key === 'Enter') handleRegister();
                    });
                }
            }

            async function handleLogin() {
                const username = document.getElementById('loginUsername').value.trim();
                const password = document.getElementById('loginPassword').value;
                const errorEl = document.getElementById('authError');
                if (!username || !password) {
                    errorEl.textContent = 'Заполните все поля.';
                    return;
                }
                const result = await loginUser(username, password);
                if (result.success) {
                    closeModal('authModal');
                    renderHeader();
                    navigateTo('topics');
                } else {
                    errorEl.textContent = result.error;
                }
            }

            async function handleRegister() {
                const username = document.getElementById('regUsername').value.trim();
                const password = document.getElementById('regPassword').value;
                const confirm = document.getElementById('regPasswordConfirm').value;
                const errorEl = document.getElementById('authError');
                if (!username || !password || !confirm) {
                    errorEl.textContent = 'Заполните все поля.';
                    return;
                }
                if (password !== confirm) {
                    errorEl.textContent = 'Пароли не совпадают.';
                    return;
                }
                const result = await registerUser(username, password);
                if (result.success) {
                    closeModal('authModal');
                    renderHeader();
                    navigateTo('topics');
                } else {
                    errorEl.textContent = result.error;
                }
            }

            // ============================================================
            //  МОДАЛЬНОЕ ОКНО: СОЗДАНИЕ ТЕМЫ
            // ============================================================
            function openCreateTopicModal() {
                if (!isLoggedIn()) {
                    openAuthModal('login');
                    return;
                }
                const modalId = 'createTopicModal';
                const contentHTML = `
                    <h2>📝 Новая тема</h2>
                    <div class="form-group">
                        <label>Заголовок темы</label>
                        <input type="text" class="form-input" id="newTopicTitle" placeholder="Введите заголовок" maxlength="200">
                    </div>
                    <div class="form-group">
                        <label>Первое сообщение</label>
                        <textarea class="form-textarea" id="newTopicContent" placeholder="Текст сообщения..." rows="5"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Вложения (URL или файлы)</label>
                        <input type="text" class="form-input mt-8" id="newTopicUrl" placeholder="Вставьте ссылку на изображение или видео">
                        <div class="flex-row gap-8 mt-8">
                            <button class="btn btn-outline btn-sm" id="btnAddAttachmentTopic">📎 Загрузить файл</button>
                            <span class="form-hint" id="topicAttachmentHint"></span>
                        </div>
                        <div id="topicAttachmentPreview" class="flex-row gap-8 mt-8"></div>
                    </div>
                    <div id="createTopicError" class="text-muted mt-8" style="color:#ff6666!important;min-height:20px;"></div>
                    <button class="btn btn-primary mt-8" id="btnSubmitTopic" style="width:100%;">Опубликовать тему</button>
                `;
                openModal(modalId, contentHTML);

                // Временное хранилище вложений для новой темы
                let tempAttachments = [];

                document.getElementById('btnSubmitTopic').addEventListener('click', async function() {
                    const title = document.getElementById('newTopicTitle').value.trim();
                    const content = document.getElementById('newTopicContent').value.trim();
                    const urlInput = document.getElementById('newTopicUrl').value.trim();
                    const errorEl = document.getElementById('createTopicError');

                    if (!title) { errorEl.textContent = 'Введите заголовок темы.'; return; }
                    if (!content && tempAttachments.length === 0 && !urlInput) {
                        errorEl.textContent = 'Введите текст сообщения или добавьте вложение.';
                        return;
                    }

                    // Собираем вложения
                    let allAttachments = [...tempAttachments];
                    if (urlInput) {
                        if (isImageURL(urlInput)) allAttachments.push({ type: 'image', url: urlInput,
                            name: 'image_url' });
                        else if (isVideoURL(urlInput)) allAttachments.push({ type: 'video', url: urlInput,
                            name: 'video_url' });
                        else allAttachments.push({ type: 'link', url: urlInput, name: 'link' });
                    }

                    const topicId = createTopic(title, content, allAttachments);
                    if (topicId) {
                        closeModal(modalId);
                        navigateTo('topic', { topicId });
                    } else {
                        errorEl.textContent = 'Ошибка при создании темы.';
                    }
                });

                document.getElementById('btnAddAttachmentTopic').addEventListener('click', function() {
                    const input = document.getElementById('hiddenAttachmentInput');
                    input.click();
                    input.onchange = async function() {
                        const files = Array.from(input.files);
                        const previewDiv = document.getElementById('topicAttachmentPreview');
                        const hintEl = document.getElementById('topicAttachmentHint');
                        for (const file of files) {
                            const sizeCheck = validateFileSize(file, 2);
                            if (!sizeCheck.valid) {
                                hintEl.textContent = sizeCheck.error;
                                continue;
                            }
                            try {
                                const base64 = await fileToBase64(file);
                                const type = isImageFile(file) ? 'image' : (isVideoFile(file) ? 'video' :
                                    'file');
                                tempAttachments.push({ type, url: base64, name: file.name });
                                if (type === 'image') {
                                    previewDiv.innerHTML +=
                                        `<img src="${base64}" class="attachment-preview" style="max-width:80px;max-height:60px;" title="${escapeHTML(file.name)}">`;
                                } else if (type === 'video') {
                                    previewDiv.innerHTML +=
                                        `<video src="${base64}" class="attachment-preview" style="max-width:80px;max-height:60px;" muted title="${escapeHTML(file.name)}"></video>`;
                                }
                                hintEl.textContent = `Загружено: ${tempAttachments.length} файл(ов)`;
                            } catch (e) {
                                hintEl.textContent = 'Ошибка загрузки файла.';
                            }
                        }
                        input.value = '';
                    };
                });
            }
            // Продолжение следует...
            // ============================================================
        })();
    </script>
</body>
</html>
